<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piattaforma delle Competenze Trasversali – Italiano</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <div class="nebula"></div>
  <canvas id="stars"></canvas>

  <div class="mind-map">

    <div class="sun" id="sun" role="button" aria-label="Espandi mappa mentale">
      <div class="sun-core"></div>
      <div class="sun-glow"></div>
      <span class="sun-label">Italiano</span>
    </div>

    <div class="branch branch-ricezione">
      <a href="html/ricezione.html" class="planet-link">
        <div class="planet-body" style="background: radial-gradient(circle at 30% 25%, #6a8cff, #2d4ba0); box-shadow: 0 0 40px rgba(106,140,255,0.4);">
          <div class="planet-icon">🎧</div>
          <div class="planet-name">Ricezione</div>
        </div>
        <div class="planet-sub">Ascoltare · Leggere</div>
      </a>
    </div>

    <div class="branch branch-produzione">
      <a href="html/produzione.html" class="planet-link">
        <div class="planet-body" style="background: radial-gradient(circle at 30% 25%, #ffb347, #c77d1a); box-shadow: 0 0 40px rgba(255,180,70,0.4);">
          <div class="planet-icon">🎤</div>
          <div class="planet-name">Produzione</div>
        </div>
        <div class="planet-sub">Parlare · Scrivere</div>
      </a>
    </div>

    <div class="branch branch-risorse">
      <a href="html/risorse.html" class="planet-link">
        <div class="planet-body" style="background: radial-gradient(circle at 30% 25%, #4dd9b6, #1f8a70); box-shadow: 0 0 40px rgba(77,217,182,0.4);">
          <div class="planet-icon">📖</div>
          <div class="planet-name">Risorse</div>
        </div>
        <div class="planet-sub">7 tipi di testo</div>
      </a>
    </div>

    <p class="hint" id="hint">CLICCA IL SOLE PER ESPLORARE</p>
  </div>

  <footer class="site-footer">© 2026 Noah Laveder</footer>
  <script src="style/script.js"></script>
</body>
</html>
